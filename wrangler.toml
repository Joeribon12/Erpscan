# Cloudflare deploy-config voor de site + lead-API (Workers Static Assets).
# Cloudflare draait bij elke push `npx wrangler deploy` vanaf de repo-root.

name = "erpscan"
main = "src/worker.js"
compatibility_date = "2024-11-01"

[assets]
directory = "./public"
binding = "ASSETS"
# De Worker draait eerst (zodat /api/lead werkt); statische bestanden en de
# SPA-fallback worden in src/worker.js via env.ASSETS afgehandeld.
run_worker_first = true
