name = "lead-capture"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Niet-geheime variabelen mogen hier. GEHEIMEN (private key) NIET hier zetten —
# die zet je met `wrangler secret put` (zie /worker/README.md).
[vars]
SHEET_TAB = "Leads"
ALLOWED_ORIGIN = "*"   # zet in productie op je Pages-URL, bv. https://erp-scan.pages.dev
# GOOGLE_SHEET_ID en GOOGLE_SERVICE_ACCOUNT_EMAIL mogen ook hier als [vars],
# maar voor het gemak documenteren we ze als secrets in de README.
